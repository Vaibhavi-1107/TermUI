# Canonical label list for TermUI, GSSoC 2026.
# .github/workflows/gssoc-labels-sync.yml syncs this file to the repo on push.
# Edit this file to add, remove, or rename labels. The workflow reconciles.

# GSSoC point-system labels (mandatory)
- name: "gssoc:approved"
  color: "0e8a16"
  description: "Approved PR. Earns +50 base points."
- name: "gssoc:invalid"
  color: "d93f0b"
  description: "PR violates GSSoC rules. 0 points."
- name: "gssoc:spam"
  color: "b60205"
  description: "Spam contribution. 0 points and disqualification risk."
- name: "gssoc:ai-slop"
  color: "b60205"
  description: "Low-effort AI-generated content. 0 points."

# Difficulty (admin picks one)
- name: "level:beginner"
  color: "c2e0c6"
  description: "+20 pts. Entry-level task."
- name: "level:intermediate"
  color: "fbca04"
  description: "+35 pts. Moderate task."
- name: "level:advanced"
  color: "ee9322"
  description: "+55 pts. Complex task."
- name: "level:critical"
  color: "b60205"
  description: "+80 pts. High-impact task."

# Quality multiplier (admin sets after review)
- name: "quality:clean"
  color: "0e8a16"
  description: "x 1.2 multiplier. Clean implementation."
- name: "quality:exceptional"
  color: "5319e7"
  description: "x 1.5 multiplier. Exceptional work."

# Type bonus (stackable, auto-applied)
- name: "type:docs"
  color: "0075ca"
  description: "+5 pts. Documentation."
- name: "type:bug"
  color: "d73a4a"
  description: "+10 pts. Bug fix."
- name: "type:feature"
  color: "a2eeef"
  description: "+10 pts. New feature."
- name: "type:testing"
  color: "bfd4f2"
  description: "+10 pts. Tests."
- name: "type:design"
  color: "d4c5f9"
  description: "+10 pts. Visual or UX work."
- name: "type:refactor"
  color: "fef2c0"
  description: "+10 pts. Refactor."
- name: "type:accessibility"
  color: "1d76db"
  description: "+15 pts. Accessibility."
- name: "type:performance"
  color: "fbca04"
  description: "+15 pts. Performance."
- name: "type:devops"
  color: "0e8a16"
  description: "+15 pts. CI, build, or release."
- name: "type:security"
  color: "b60205"
  description: "+20 pts. Security fix."

# Area labels (path-based, auto-applied)
- name: "area:core"
  color: "e6e6e6"
  description: "@termuijs/core"
- name: "area:widgets"
  color: "e6e6e6"
  description: "@termuijs/widgets"
- name: "area:ui"
  color: "e6e6e6"
  description: "@termuijs/ui"
- name: "area:jsx"
  color: "e6e6e6"
  description: "@termuijs/jsx"
- name: "area:tss"
  color: "e6e6e6"
  description: "@termuijs/tss"
- name: "area:data"
  color: "e6e6e6"
  description: "@termuijs/data"
- name: "area:dev-server"
  color: "e6e6e6"
  description: "@termuijs/dev-server"
- name: "area:website"
  color: "e6e6e6"
  description: "Docs website."
- name: "area:examples"
  color: "e6e6e6"
  description: "Example apps."

# Workflow control
- name: "good first issue"
  color: "7057ff"
  description: "Beginner-friendly task."
- name: "help wanted"
  color: "008672"
  description: "Extra attention needed."
- name: "needs-star"
  color: "fbca04"
  description: "PR author has not starred the repo."
- name: "assigned"
  color: "008672"
  description: "Issue claimed by a contributor."
- name: "stale"
  color: "ededed"
  description: "No activity in 14 days."
- name: "gssoc-request"
  color: "5319e7"
  description: "GSSoC contributor introduction issue."
